name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 기본 브랜치 푸시 시 자동 실행 (필요에 따라 master 등으로 변경 가능)

# GitHub Pages 배포를 위한 최소 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 빌드 및 배포 충돌을 방지하기 위한 동시성 그룹 지정 (최신 실행 건 위주로 배포 진행)
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
